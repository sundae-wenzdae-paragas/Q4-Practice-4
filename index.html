<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>Q4 Practice 4</title>

    <style>
        body{
            background-color:burlywood;
        }

    </style>

</head>
<body>
    <h2>Login Form</h2>
    <form>
        <label for="">Username</label>
            <br>
            <input type="text" id="uname" class="form-control" placeholder="Enter here" required><br>

            <label for="pwd">Password</label>
            <br>
            <input type="password" id="pwd" class="form-control" placeholder="Enter here" required>

            <p id="display"></p>
            <input type="button" name="button" id="loginBTN" value="Login" class="btn btn-info rounded-5" onclick="authenticate()">

            <input type="reset" name="button" id="cancel" value="Cancel" class="btn btn-info rounded-5" >
    </form>

    <script>
        let attempt_counter = 0; // This stays outside so it remembers the count between clicks

function authenticate() {
    // 1. Grab the values inside the function
    let username = document.getElementById("uname").value;
    let pwd = document.getElementById("pwd").value;
    
    let display = document.getElementById("display");
    let loginBtn = document.getElementById("loginBTN");

    // 2. Check if the credentials are correct
    if (username === "mrbeast67" && pwd === "12345678") {
        alert("Welcome " + username + "!");
        attempt_counter = 0; 
        display.innerHTML = "";
        window.location.href = "dashboard.html";
    } 
    else {
        // 3. Handle incorrect login
        attempt_counter++;
        
        if (attempt_counter >= 3) {
            display.innerHTML = "Access denied. Account locked!";
            alert("Access denied. Account locked after 3 attempts!");
            loginBtn.disabled = true; // Lock the button
        } else {
            display.innerHTML = "Incorrect username and/or password. Attempt " + attempt_counter + " of 3";
        }
    }
}
    </script>

</body>
</html>
